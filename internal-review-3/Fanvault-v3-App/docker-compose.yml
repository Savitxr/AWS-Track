services:
  user-service:
    build:
      context: ./fanvault-user-service
      dockerfile: Dockerfile
    image: fanvault-user-service:latest
    container_name: fanvault-user-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - DYNAMODB_TABLE_PROFILES=${DYNAMODB_TABLE_PROFILES:-fanvault-profiles}
      - USE_SECRETS_MANAGER=false
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=http://localhost
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => { if (r.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  commerce-service:
    build:
      context: ./fanvault-commerce-service
      dockerfile: Dockerfile
    image: fanvault-commerce-service:latest
    container_name: fanvault-commerce-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=development
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - DYNAMODB_TABLE_PRODUCTS=${DYNAMODB_TABLE_PRODUCTS:-fanvault-products}
      - DYNAMODB_TABLE_ORDERS=${DYNAMODB_TABLE_ORDERS:-fanvault-orders}
      - DYNAMODB_TABLE_METADATA=${DYNAMODB_TABLE_METADATA:-fanvault-metadata}
      - USE_SECRETS_MANAGER=false
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=http://localhost
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => { if (r.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./fanvault-frontend
      dockerfile: Dockerfile
    image: fanvault-frontend:latest
    container_name: fanvault-frontend
    ports:
      - "80:80"
    environment:
      - IDENTITY_SERVICE_HOST=user-service
      - IDENTITY_SERVICE_PORT=3001
      - COMMERCE_SERVICE_HOST=commerce-service
      - COMMERCE_SERVICE_PORT=3002
    depends_on:
      user-service:
        condition: service_healthy
      commerce-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
