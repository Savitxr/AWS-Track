apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "commerce-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "commerce-service.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "commerce-service.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: {{ include "commerce-service.fullname" . }}
