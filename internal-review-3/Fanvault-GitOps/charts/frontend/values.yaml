replicaCount: 1

image:
  repository: fanvault-frontend
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 80

containerPort: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingress:
    # Allow traffic from gateway/ingress on port 80
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus


serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics

# ServiceAccount variables
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Nginx reverse proxy values for local/VPC loopback proxy routes
config:
  USER_SERVICE_HOST: "dev-user-service"
  USER_SERVICE_PORT: "3001"
  COMMERCE_SERVICE_HOST: "dev-commerce-service"
  COMMERCE_SERVICE_PORT: "3002"
