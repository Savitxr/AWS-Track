name: Terraform Deploy (Apply)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Initialize Terraform
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Generate Workflow Summary
        run: |
          echo "### Terraform Apply Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "Terraform infrastructure has been successfully applied to the \`main\` branch!" >> $GITHUB_STEP_SUMMARY
          echo "#### Details:" >> $GITHUB_STEP_SUMMARY
          echo "- **Authentication**: GitHub OIDC assumed role successfully ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Apply Status**: Success ✅" >> $GITHUB_STEP_SUMMARY
