# =============================================================================
# ALB Listener Rules — FanVault v2
# =============================================================================
# This file documents the path-based routing rules to configure on the
# Application Load Balancer (ALB) Listeners using the AWS Console or CLI.
#
# Listener: HTTPS :443 (and HTTP :80 → redirect to HTTPS)
#
# All traffic flows:
#   Internet → ALB → Target Group (Frontend EC2 instances) → Nginx → Backend
#
# The ALB forwards ALL traffic to the Frontend target group.
# Nginx on the Frontend EC2 instances performs the internal path-based
# routing to auth-svc.fanvault.internal and commerce-svc.fanvault.internal.
#
# This means only ONE ALB target group is required for the Frontend Nginx tier.
# Backend services are NOT registered directly with the ALB — they are
# internal-only and accessed via private DNS.
# =============================================================================

# ── ALB Target Group Configuration ───────────────────────────────────────────
# Target Group: fanvault-frontend-tg
#   Protocol      : HTTP
#   Port          : 80
#   Health Check  : GET /health  (expects HTTP 200)
#   Targets       : Frontend EC2 instances in frontend private subnets

# ── ALB Listener Rules (HTTPS :443) ──────────────────────────────────────────
# Rule Priority | Condition          | Action
# 1             | Path: /*           | Forward → fanvault-frontend-tg

# ── ALB Listener (HTTP :80) ───────────────────────────────────────────────────
# Redirect all HTTP → HTTPS (301 Permanent Redirect)

# ── AWS CLI — Create Target Group ─────────────────────────────────────────────
# aws elbv2 create-target-group \
#   --name fanvault-frontend-tg \
#   --protocol HTTP \
#   --port 80 \
#   --vpc-id vpc-XXXXXXXX \
#   --health-check-path /health \
#   --health-check-interval-seconds 30 \
#   --healthy-threshold-count 2 \
#   --unhealthy-threshold-count 3 \
#   --target-type instance

# ── Register EC2 instances to target group ────────────────────────────────────
# aws elbv2 register-targets \
#   --target-group-arn arn:aws:elasticloadbalancing:... \
#   --targets Id=i-XXXXXXXXXXXXXXX1 Id=i-XXXXXXXXXXXXXXX2
